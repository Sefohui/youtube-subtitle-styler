<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Subtitle Styler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      background: #141414;
      color: #d0d0d0;
      width: 220px;
      padding: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #2a2a2a;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 18px;
      height: 18px;
      background: #ff0000;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo::after {
      content: "";
      border-style: solid;
      border-width: 4px 0 4px 8px;
      border-color: transparent transparent transparent #fff;
      margin-left: 2px;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .toggle-label {
      color: #bbb;
      font-size: 13px;
    }

    .switch {
      position: relative;
      width: 34px;
      height: 18px;
      flex: none;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #383838;
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      left: 3px;
      top: 3px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    input:checked + .slider { background: #ff3333; }
    input:checked + .slider::before {
      transform: translateX(16px);
      background: #fff;
    }

    .settings-btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #383838;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }

    .settings-btn:hover { background: #333; color: #fff; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">
      <div class="logo"></div>
      <h1>Subtitle Styler</h1>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Enable styles</span>
    <label class="switch">
      <input type="checkbox" id="enabled" />
      <span class="slider"></span>
    </label>
  </div>

  <button class="settings-btn" id="openSettings">Open settings</button>

  <script src="popup.js"></script>
</body>
</html>
