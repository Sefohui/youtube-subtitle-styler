<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Subtitle Styler — Import / Export</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      background: #0f0f0f;
      color: #d0d0d0;
      min-height: 100vh;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 36px 24px 48px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: #ff0000;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo::after {
      content: "";
      border-style: solid;
      border-width: 7px 0 7px 13px;
      border-color: transparent transparent transparent #fff;
      margin-left: 3px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
    }

    .header p {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    /* ── Card ── */
    .card {
      background: #1a1a1a;
      border: 1px solid #272727;
      border-radius: 10px;
      overflow: hidden;
    }

    .field {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #222;
    }

    .field:last-child { border-bottom: none; }

    .field-label {
      flex: 1;
      color: #aaa;
    }

    .field-desc {
      font-size: 12px;
      color: #555;
      margin-top: 3px;
    }

    /* ── Buttons ── */
    .io-btn {
      padding: 8px 18px;
      background: #1e1e1e;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }

    .io-btn:hover { background: #2a2a2a; color: #fff; }
    .io-btn.primary { background: #ff3333; color: #fff; border-color: #ff3333; }
    .io-btn.primary:hover { background: #e02020; border-color: #e02020; }

    .status {
      text-align: center;
      font-size: 12px;
      color: transparent;
      margin-top: 16px;
      height: 16px;
    }

    .status.saved { color: #44cc66; }
    .status.error { color: #ff6666; }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="logo"></div>
    <div>
      <h1>YouTube Subtitle Styler</h1>
      <p>Import / Export</p>
    </div>
  </div>

  <div class="card">

    <div class="field">
      <div>
        <div class="field-label">Export settings</div>
        <div class="field-desc">Save your current settings to a JSON file</div>
      </div>
      <button class="io-btn primary" id="exportBtn">Export</button>
    </div>

    <div class="field">
      <div>
        <div class="field-label">Import settings</div>
        <div class="field-desc">Load settings from a previously exported file</div>
      </div>
      <button class="io-btn" id="importBtn">Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none" />
    </div>

  </div>

  <div class="status" id="status"></div>

</div>
<script src="options.js"></script>
</body>
</html>
